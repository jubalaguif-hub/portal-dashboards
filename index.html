<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <title>Dashboard | Hospital Metropolitano Odilon Behrens</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Portal centralizado de dashboards e planilhas do Hospital Metropolitano Odilon Behrens" />
  <link rel="icon" href="./img/icon/logo_pagina.ico" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>

<div class="app">

  <button id="theme-toggle" class="theme-toggle-float" aria-label="Alternar modo escuro/claro">
    🌙
  </button>

  <aside class="sidebar" role="navigation" aria-label="Menu de navegação principal">

    <div class="logo">
      <img src="./img/logos/logo.webp" alt="Logo do Hospital Metropolitano Odilon Behrens">
    </div>

    <button id="hamburger" class="hamburger" aria-label="Fechar menu de navegação" aria-expanded="true">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <input type="text" class="search" placeholder="Buscar dashboards..." aria-label="Buscar dashboards" />

    <nav class="menu" aria-label="Menu de categorias">

      <div class="menu-item">
        <button class="menu-dashboard" aria-expanded="false" aria-controls="submenu">
          <div class="left">
            <span class="icon home" aria-hidden="true"></span>
            <span class="text">Dashboard</span>
          </div>
          <span class="arrow" aria-hidden="true">▾</span>
        </button>

        <div id="submenu" class="submenu open" role="menu">
          <a class="active" data-section="assistencial" role="menuitem" aria-current="page">
            <span class="icon gestao"></span>
            Assistencial
          </a>
          <a data-section="rh" role="menuitem">
            <span class="icon recursos"></span>
            RH
          </a>
          <a data-section="planilhas" role="menuitem">
            <span class="icon plani"></span>
            Planilhas
          </a>

          <div id="custom-categories-menu"></div>
        </div>
      </div>

      <div class="menu-item">
        <button class="menu-config" aria-expanded="false" aria-controls="submenu-config">
          <div class="left">
            <span class="icon manage"></span>
            <span class="text">Gerenciar</span>
          </div>
          <span class="arrow">▾</span>
        </button>

        <div id="submenu-config" class="submenu" role="menu">
        </div>
      </div>

    </nav>

  </aside>

  <main class="content" role="main">

    <!-- ASSISTENCIAL -->
    <section id="assistencial" class="section active" aria-hidden="false">
      <h1 class="section-title">Assistencial</h1>

      <a href="https://app.powerbi.com/view?r=eyJrIjoiNWFiNjBhNDAtZWFiOS00NmZlLWFlNDMtMjE1NTc2MDZjZjc4IiwidCI6IjQ4MWJhOGIyLTU0MmItNDllNS1iNzRhLWM1ODQ1Zjg1YzVlMyJ9"
         target="_blank" class="banner assistencial" data-sheet-id="default-nedocs">
        <div class="banner-text">
          <h2>Nedocs, Boarding e PCP - Dashboard Assistencial</h2>
        </div>
      </a>

      <a href="https://app.powerbi.com/view?r=eyJrIjoiMDkxMDZhYWQtZmY2OS00YzBhLTlmZmUtYTBlNjliY2Y4YTA4IiwidCI6IjQ4MWJhOGIyLTU0MmItNDllNS1iNzRhLWM1ODQ1Zjg1YzVlMyJ9"
         target="_blank" class="banner exames" data-sheet-id="default-exames">
        <div class="banner-text">
          <h2>Exames MV Tomografia</h2>
        </div>
      </a>

      <a href="https://app.powerbi.com/view?r=eyJrIjoiMDQwNTQ2YWItZTgzYi00MTVkLTkyODktNWY4MmJjN2I1NWY1IiwidCI6IjQ4MWJhOGIyLTU0MmItNDllNS1iNzRhLWM1ODQ1Zjg1YzVlMyJ9"
         target="_blank" class="banner ambulancia" data-sheet-id="default-ambulancia">
        <div class="banner-text">
          <h2>Painel de Atendimentos por Unidade Analítica</h2>
        </div>
      </a>

      <!-- NOVO DASHBOARD ADICIONADO -->
      <a href="https://app.powerbi.com/view?r=eyJrIjoiNzNlNjllZTAtODMyMC00OWFiLTg5ZDQtM2ZkNGQ2N2VjYzZhIiwidCI6IjQ4MWJhOGIyLTU0MmItNDllNS1iNzRhLWM1ODQ1Zjg1YzVlMyJ9"
         target="_blank"
         class="banner poli-upa"
         aria-label="Abrir dashboard: Registros Poli e UPA"
         data-sheet-id="default-poli-upa">

        <div class="banner-text">
          <h2>Registros Poli e UPA</h2>
        </div>

      </a>
      <!-- FIM DO NOVO DASHBOARD -->

    </section>

  </main>

</div>

<script src="script.js" defer></script>

</body>
</html>
